# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
  branches:
    include:
    - master
    - 202???
    - 201???

pr:
  branches:
    include:
    - master
    - 202???
    - 201???

variables:
  - name: BUILD_BRANCH
    ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
      value: $(System.PullRequest.TargetBranch)
    ${{ else }}:
      value: $(Build.SourceBranchName)
  - name: UNIT_TEST_FLAG
    value: 'ENABLE_TRANSLIB_WRITE=y'

resources:
  repositories:
  - repository: sonic-mgmt-common
    type: github
    name: sonic-net/sonic-mgmt-common
    endpoint: sonic-net
    ref: refs/heads/$(BUILD_BRANCH)
  - repository: sonic-swss-common
    type: github
    name: sonic-net/sonic-swss-common
    endpoint: sonic-net
    ref: refs/heads/$(BUILD_BRANCH)

stages:
- stage: Build
  jobs:
  # Fast pure package testing - no SONiC dependencies needed
  - job: PureCIJob
    displayName: "Pure Package CI"
    timeoutInMinutes: 15

    pool:
      vmImage: ubuntu-22.04

    variables:
      GO_VERSION: '1.19.8'

    steps:
    - checkout: self
      clean: true
      displayName: 'Checkout code'

    - checkout: sonic-mgmt-common
      clean: true
      displayName: 'Checkout sonic-mgmt-common'

    - script: |
        wget https://go.dev/dl/go$(GO_VERSION).linux-amd64.tar.gz
        sudo tar -C /usr/local -xzf go$(GO_VERSION).linux-amd64.tar.gz
        export PATH=$PATH:/usr/local/go/bin
        go version
      displayName: 'Install Go'

    - bash: |
        set -euo pipefail
        export PATH=$PATH:/usr/local/go/bin:$(go env GOPATH)/bin
        cd sonic-gnmi
        go mod tidy
        make -f pure.mk junit-xml
      displayName: 'Run Pure Package Tests'

    - task: PublishTestResults@2
      displayName: 'Publish Pure Package Test Results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(System.DefaultWorkingDirectory)/sonic-gnmi/test-results/junit-pure.xml'
        failTaskOnFailedTests: true
        publishRunAttachments: true
        testRunTitle: 'Pure Package Tests'

    - task: PublishCodeCoverageResults@1
      displayName: 'Publish Pure Package Coverage'
      condition: always()
      inputs:
        codeCoverageTool: Cobertura
        summaryFileLocation: '$(System.DefaultWorkingDirectory)/sonic-gnmi/test-results/coverage-pure.xml'

  # Memory leak testing with address sanitizer
  - job: MemoryLeakJob
    displayName: "Memory Leak Tests"
    timeoutInMinutes: 45

    pool:
      name: sonicso1ES-amd64
      vmImage: ubuntu-22.04

    variables:
      DIFF_COVER_CHECK_THRESHOLD: 80
      DIFF_COVER_ENABLE: 'true'
      DIFF_COVER_WORKING_DIRECTORY: $(System.DefaultWorkingDirectory)/sonic-gnmi
      UNIT_TEST_FLAG: 'ENABLE_TRANSLIB_WRITE=y'

    container:
      image: sonicdev-microsoft.azurecr.io:443/sonic-slave-bookworm:latest

    steps:
    - checkout: self
      clean: true
      submodules: recursive
      displayName: 'Checkout code'

    - checkout: sonic-mgmt-common
      clean: true
      submodules: recursive
      displayName: 'Checkout sonic-mgmt-common'

    - checkout: sonic-swss-common
      clean: true
      submodules: recursive
      displayName: 'Checkout sonic-swss-common'

    # Install SONiC dependencies using shared template
    - template: .azure/templates/install-dependencies.yml
      parameters:
        buildBranch: $(BUILD_BRANCH)

    # Memory leak tests with JUnit XML generation
    
    - bash: |
        set -euo pipefail
        pushd sonic-gnmi
        make all && $(UNIT_TEST_FLAG) make check_memleak_junit
        popd
      displayName: 'Run Memory Leak Tests'

    - task: PublishTestResults@2
      displayName: 'Publish Memory Leak Test Results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(System.DefaultWorkingDirectory)/sonic-gnmi/test-results/junit-memleak-standard.xml'
        failTaskOnFailedTests: true
        publishRunAttachments: true
        testRunTitle: 'Memory Leak Tests'

  # Full integration testing with SONiC dependencies
  - job: build
    displayName: "build"
    timeoutInMinutes: 60

    pool:
      name: sonicso1ES-amd64
      vmImage: ubuntu-22.04

    variables:
      DIFF_COVER_CHECK_THRESHOLD: 80
      DIFF_COVER_ENABLE: 'true'
      DIFF_COVER_WORKING_DIRECTORY: $(System.DefaultWorkingDirectory)/sonic-gnmi

    container:
      image: sonicdev-microsoft.azurecr.io:443/sonic-slave-bookworm:latest

    steps:
    - checkout: self
      clean: true
      submodules: recursive
      displayName: 'Checkout code'

    - checkout: sonic-mgmt-common
      clean: true
      submodules: recursive
      displayName: 'Checkout sonic-mgmt-common'

    - checkout: sonic-swss-common
      clean: true
      submodules: recursive
      displayName: 'Checkout sonic-swss-common'

    # Integration tests have been separated from pure package tests
    # Pure package CI now runs in the separate PureCIJob above
    # The steps below are for integration testing with SONiC dependencies
    
    # Install SONiC dependencies using shared template
    - template: .azure/templates/install-dependencies.yml
      parameters:
        buildBranch: $(BUILD_BRANCH)

    # Build sonic-mgmt-common and sonic-gnmi
    - script: |
        set -ex
        ls -l

        pushd sonic-mgmt-common
        NO_TEST_BINS=1 dpkg-buildpackage -rfakeroot -b -us -uc
        popd

        pushd sonic-gnmi
        ENABLE_TRANSLIB_WRITE=y ENABLE_NATIVE_WRITE=y dpkg-buildpackage -rfakeroot -us -uc -b -j$(nproc) && cp ../*.deb $(Build.ArtifactStagingDirectory)/
      displayName: "Build"

    # Run pure package tests for coverage (test results already published by PureCIJob)
    - bash: |
        set -euo pipefail
        pushd sonic-gnmi
        make -f pure.mk junit-xml || true
        popd
      displayName: "Run Pure Package Tests (coverage only)"

    # Run integration tests
    - bash: |
        set -euo pipefail
        pushd sonic-gnmi
        make all && $(UNIT_TEST_FLAG) make check_gotest_junit
        popd
      displayName: "Run Integration Tests"

    - task: PublishTestResults@2
      displayName: 'Publish Integration Test Results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: |
          $(System.DefaultWorkingDirectory)/sonic-gnmi/test-results/junit-integration-basic.xml
          $(System.DefaultWorkingDirectory)/sonic-gnmi/test-results/junit-integration-env.xml
          $(System.DefaultWorkingDirectory)/sonic-gnmi/test-results/junit-integration-dialout.xml
        failTaskOnFailedTests: true
        publishRunAttachments: true
        testRunTitle: 'Integration Tests'

    - publish: $(Build.ArtifactStagingDirectory)/
      artifact: sonic-gnmi
      displayName: "Archive artifacts"

    - task: PublishCodeCoverageResults@1
      inputs:
        codeCoverageTool: Cobertura
        summaryFileLocation: '$(System.DefaultWorkingDirectory)/sonic-gnmi/coverage.xml'
      displayName: 'Publish coverage'

# ── Dev Container Image ────────────────────────────────────────────────────────
# Builds the sonic-gnmi developer container image (Dockerfile.dev) and
# publishes it as a pipeline artifact.
#
# Only runs on pushes to master/release branches (not PRs) since the image
# only needs to be refreshed when Dockerfile.dev or its deps change.
#
# TODO: once a service connection to a public registry is configured,
#       add a docker push step after the build step here.
- stage: DevContainer
  displayName: "Dev Container Image"
  dependsOn: []   # run in parallel with Build stage, always runs
  condition: always()

  jobs:
  - job: BuildDevImage
    displayName: "Build dev container image"
    timeoutInMinutes: 60

    # Run on the host (not inside a container) so Docker is available.
    pool:
      name: sonicso1ES-amd64

    steps:
    - checkout: self
      clean: true
      displayName: 'Checkout code'

    # Download all deps and collect into deps/ build context (shared template)
    - template: .azure/templates/download-dependencies.yml
      parameters:
        buildBranch: master

    - bash: |
        set -ex
        IMAGE_TAG="sonic-gnmi-dev:$(Build.SourceBranchName)-$(Build.BuildId)"
        IMAGE_LATEST="sonic-gnmi-dev:latest"

        docker build \
          --build-arg BUILD_BRANCH=$(BUILD_BRANCH) \
          -f Dockerfile.dev \
          -t "${IMAGE_TAG}" \
          -t "${IMAGE_LATEST}" \
          .

        # Save as compressed tar for the pipeline artifact.
        # To push to a registry later, add:
        #   docker tag ${IMAGE_TAG} <registry>/<repo>:${TAG}
        #   docker push <registry>/<repo>:${TAG}
        mkdir -p "$(Build.ArtifactStagingDirectory)/dev-image"
        docker save "${IMAGE_TAG}" | gzip -1 \
          > "$(Build.ArtifactStagingDirectory)/dev-image/sonic-gnmi-dev.tar.gz"

        echo "Image saved: $(Build.ArtifactStagingDirectory)/dev-image/sonic-gnmi-dev.tar.gz"
      displayName: 'Build dev container image'

    # Smoke-test: start the container and run a fast pure-Go test to verify
    # that swsscommon bindings, Go toolchain, and basic packages all work.
    - bash: |
        set -ex
        IMAGE_TAG="sonic-gnmi-dev:$(Build.SourceBranchName)-$(Build.BuildId)"

        # Start container with current source mounted.
        # With a single `checkout: self`, Build.SourcesDirectory is the repo root.
        docker run -d --name sonic-gnmi-dev-smoke \
          -v "$(Build.SourcesDirectory):/workspace/sonic-gnmi" \
          "${IMAGE_TAG}" sleep 300

        # Sync vendor, then run the sonic_db_config test suite.
        # These tests exercise swsscommon CGO bindings (SonicDBKey, DbConnector, etc.)
        # without needing Redis or a running SONiC system — fast and representative.
        # A failure here means the swsscommon version in the image is incompatible
        # with the current source.
        docker exec sonic-gnmi-dev-smoke bash -c "
          set -ex
          cd /workspace/sonic-gnmi
          go mod vendor
          export CGO_LDFLAGS='-lswsscommon -lhiredis'
          export CGO_CXXFLAGS='-I/usr/include/swss -w -Wall -fpermissive'
          export CGO_CFLAGS='-I/usr/include/swss'
          sudo -E go test -v -gcflags=all=-l \
            github.com/sonic-net/sonic-gnmi/sonic_db_config
        "

        docker rm -f sonic-gnmi-dev-smoke || true
      displayName: 'Smoke test dev container image'

    - publish: $(Build.ArtifactStagingDirectory)/dev-image
      artifact: sonic-gnmi-dev-image
      displayName: 'Publish dev image artifact'
