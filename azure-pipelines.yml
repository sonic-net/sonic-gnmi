# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
  branches:
    include:
    - master
    - 202???
    - 201???

pr:
  branches:
    include:
    - master
    - 202???
    - 201???

variables:
  - name: BUILD_BRANCH
    ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
      value: $(System.PullRequest.TargetBranch)
    ${{ else }}:
      value: $(Build.SourceBranchName)
  - name: UNIT_TEST_FLAG
    value: 'ENABLE_TRANSLIB_WRITE=y'

resources:
  repositories:
  - repository: sonic-mgmt-common
    type: github
    name: sonic-net/sonic-mgmt-common
    endpoint: sonic-net
    ref: refs/heads/$(BUILD_BRANCH)
  - repository: sonic-swss-common
    type: github
    name: sonic-net/sonic-swss-common
    endpoint: sonic-net
    ref: refs/heads/$(BUILD_BRANCH)

stages:
- stage: Build
  jobs:
  # Fast pure package testing - no SONiC dependencies needed
  - job: PureCIJob
    displayName: "Pure Package CI"
    timeoutInMinutes: 15

    pool:
      vmImage: ubuntu-22.04

    variables:
      GO_VERSION: '1.19.8'

    steps:
    - checkout: self
      clean: true
      displayName: 'Checkout code'

    - checkout: sonic-mgmt-common
      clean: true
      displayName: 'Checkout sonic-mgmt-common'

    - script: |
        wget https://go.dev/dl/go$(GO_VERSION).linux-amd64.tar.gz
        sudo tar -C /usr/local -xzf go$(GO_VERSION).linux-amd64.tar.gz
        export PATH=$PATH:/usr/local/go/bin
        go version
      displayName: 'Install Go'

    - bash: |
        set -euo pipefail
        export PATH=$PATH:/usr/local/go/bin:$(go env GOPATH)/bin
        cd sonic-gnmi
        go mod tidy
        make -f pure.mk junit-xml
      displayName: 'Run Pure Package Tests'

    - task: PublishTestResults@2
      displayName: 'Publish Pure Package Test Results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(System.DefaultWorkingDirectory)/sonic-gnmi/test-results/junit-pure.xml'
        failTaskOnFailedTests: true
        publishRunAttachments: true
        testRunTitle: 'Pure Package Tests'

    - task: PublishCodeCoverageResults@1
      displayName: 'Publish Pure Package Coverage'
      condition: always()
      inputs:
        codeCoverageTool: Cobertura
        summaryFileLocation: '$(System.DefaultWorkingDirectory)/sonic-gnmi/test-results/coverage-pure.xml'

  # Memory leak testing with address sanitizer
  - job: MemoryLeakJob
    displayName: "Memory Leak Tests"
    timeoutInMinutes: 45

    pool:
      name: sonicso1ES-amd64
      vmImage: ubuntu-22.04

    variables:
      DIFF_COVER_CHECK_THRESHOLD: 80
      DIFF_COVER_ENABLE: 'true'
      DIFF_COVER_WORKING_DIRECTORY: $(System.DefaultWorkingDirectory)/sonic-gnmi
      UNIT_TEST_FLAG: 'ENABLE_TRANSLIB_WRITE=y'

    container:
      image: sonicdev-microsoft.azurecr.io:443/sonic-slave-bookworm:latest

    steps:
    - checkout: self
      clean: true
      submodules: recursive
      displayName: 'Checkout code'

    - checkout: sonic-mgmt-common
      clean: true
      submodules: recursive
      displayName: 'Checkout sonic-mgmt-common'

    - checkout: sonic-swss-common
      clean: true
      submodules: recursive
      displayName: 'Checkout sonic-swss-common'

    # Install SONiC dependencies using shared template
    - template: .azure/templates/install-dependencies.yml
      parameters:
        buildBranch: $(BUILD_BRANCH)

    # Memory leak tests with JUnit XML generation
    
    - bash: |
        set -euo pipefail
        pushd sonic-gnmi
        make all && $(UNIT_TEST_FLAG) make check_memleak_junit
        popd
      displayName: 'Run Memory Leak Tests'

    - task: PublishTestResults@2
      displayName: 'Publish Memory Leak Test Results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(System.DefaultWorkingDirectory)/sonic-gnmi/test-results/junit-memleak-standard.xml'
        failTaskOnFailedTests: true
        publishRunAttachments: true
        testRunTitle: 'Memory Leak Tests'

  # Full integration testing with SONiC dependencies
  - job: build
    displayName: "build"
    timeoutInMinutes: 60

    pool:
      name: sonicso1ES-amd64
      vmImage: ubuntu-22.04

    variables:
      DIFF_COVER_CHECK_THRESHOLD: 80
      DIFF_COVER_ENABLE: 'true'
      DIFF_COVER_WORKING_DIRECTORY: $(System.DefaultWorkingDirectory)/sonic-gnmi
      GO_VERSION: '1.23.9'

    container:
      image: sonicdev-microsoft.azurecr.io:443/sonic-slave-bookworm:latest

    steps:
    - checkout: self
      clean: true
      submodules: recursive
      displayName: 'Checkout code'

    - checkout: sonic-mgmt-common
      clean: true
      submodules: recursive
      displayName: 'Checkout sonic-mgmt-common'

    - checkout: sonic-swss-common
      clean: true
      submodules: recursive
      displayName: 'Checkout sonic-swss-common'

    # Integration tests have been separated from pure package tests
    # Pure package CI now runs in the separate PureCIJob above
    # The steps below are for integration testing with SONiC dependencies
    
    # Install SONiC dependencies using shared template
    - template: .azure/templates/install-dependencies.yml
      parameters:
        buildBranch: $(BUILD_BRANCH)

    # Build sonic-mgmt-common with the system Go (1.19) before upgrading
    - script: |
        set -ex
        ls -l

        pushd sonic-mgmt-common
        NO_TEST_BINS=1 dpkg-buildpackage -rfakeroot -b -us -uc
        popd
      displayName: "Build sonic-mgmt-common"

    # Install Go 1.23 after sonic-mgmt-common is built (sonic-mgmt-common uses Go 1.19)
    # sonic-gnmi's go.mod requires 'go 1.23.0', and its deps (grpc v1.69.2, x/crypto v0.36.0,
    # x/sys v0.33.0) use stdlib packages (maps, slices, math/rand/v2) added in Go 1.21-1.22.
    # Prepend to PATH so our Go 1.23.9 takes priority over the system Go 1.19 (/usr/bin/go)
    # in ALL subsequent tasks (including sudo -E invocations in integration tests).
    - script: |
        wget -q https://go.dev/dl/go$(GO_VERSION).linux-amd64.tar.gz
        sudo tar -C /usr/local -xzf go$(GO_VERSION).linux-amd64.tar.gz
        # Symlink into /usr/local/bin so sudo's secure_path finds Go 1.23 before /usr/bin/go (1.19)
        sudo ln -sf /usr/local/go/bin/go /usr/local/bin/go
        echo "##vso[task.setvariable variable=PATH]/usr/local/go/bin:$PATH"
        /usr/local/go/bin/go version
      displayName: 'Install Go $(GO_VERSION) for sonic-gnmi'

    # Build sonic-gnmi with Go 1.23
    - script: |
        set -ex
        export PATH=/usr/local/go/bin:$PATH
        pushd sonic-gnmi
        ENABLE_TRANSLIB_WRITE=y ENABLE_NATIVE_WRITE=y dpkg-buildpackage -rfakeroot -us -uc -b -j$(nproc) && cp ../*.deb $(Build.ArtifactStagingDirectory)/
      displayName: "Build sonic-gnmi"

    # Run pure package tests for coverage (test results already published by PureCIJob)
    - bash: |
        set -euo pipefail
        export PATH=/usr/local/go/bin:$PATH
        pushd sonic-gnmi
        make -f pure.mk junit-xml || true
        popd
      displayName: "Run Pure Package Tests (coverage only)"

    # Run integration tests
    - bash: |
        set -euo pipefail
        export PATH=/usr/local/go/bin:$PATH
        pushd sonic-gnmi
        make all && $(UNIT_TEST_FLAG) make check_gotest_junit
        popd
      displayName: "Run Integration Tests"

    - task: PublishTestResults@2
      displayName: 'Publish Integration Test Results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: |
          $(System.DefaultWorkingDirectory)/sonic-gnmi/test-results/junit-integration-basic.xml
          $(System.DefaultWorkingDirectory)/sonic-gnmi/test-results/junit-integration-env.xml
          $(System.DefaultWorkingDirectory)/sonic-gnmi/test-results/junit-integration-dialout.xml
        failTaskOnFailedTests: true
        publishRunAttachments: true
        testRunTitle: 'Integration Tests'

    - publish: $(Build.ArtifactStagingDirectory)/
      artifact: sonic-gnmi
      displayName: "Archive artifacts"

    - task: PublishCodeCoverageResults@1
      inputs:
        codeCoverageTool: Cobertura
        summaryFileLocation: '$(System.DefaultWorkingDirectory)/sonic-gnmi/coverage.xml'
      displayName: 'Publish coverage'

# ── Dev Container Image ────────────────────────────────────────────────────────
# Builds the sonic-gnmi developer container image (Dockerfile.dev) and pushes
# it to sonicdev-microsoft.azurecr.io (publicly pullable, no auth required).
#
# Image: sonicdev-microsoft.azurecr.io:443/sonic-gnmi-dev:latest
#
# Runs in parallel with Build stage (dependsOn: []).
# Always builds (even on PRs) to catch Dockerfile.dev regressions early.
# Only pushes on non-PR builds (master / release branches).
- stage: DevContainer
  displayName: "Dev Container Image"
  dependsOn: []
  condition: always()

  jobs:
  - job: BuildDevImage
    displayName: "Build dev container image"
    timeoutInMinutes: 60

    # Run on the host (not inside a container) so Docker is available.
    pool:
      name: sonicso1ES-amd64

    variables:
      ACR_REGISTRY: sonicdev-microsoft.azurecr.io:443
      ACR_REPO: sonicdev-microsoft.azurecr.io:443/sonic-gnmi-dev

    steps:
    - checkout: self
      clean: true
      displayName: 'Checkout code'

    # Download all deps and collect into deps/ build context (shared template)
    - template: .azure/templates/download-dependencies.yml
      parameters:
        buildBranch: master

    - bash: |
        set -ex
        IMAGE_TAG="$(ACR_REPO):$(Build.SourceBranchName)-$(Build.BuildId)"
        IMAGE_BRANCH="$(ACR_REPO):$(Build.SourceBranchName)"
        IMAGE_LATEST="$(ACR_REPO):latest"

        docker build \
          --build-arg BUILD_BRANCH=$(BUILD_BRANCH) \
          -f Dockerfile.dev \
          -t "${IMAGE_TAG}" \
          .

        echo "##vso[task.setvariable variable=IMAGE_TAG]${IMAGE_TAG}"
        echo "##vso[task.setvariable variable=IMAGE_BRANCH]${IMAGE_BRANCH}"
        echo "##vso[task.setvariable variable=IMAGE_LATEST]${IMAGE_LATEST}"
      displayName: 'Build dev container image'

    # Smoke-test: start the container and run a fast pure-Go test to verify
    # that swsscommon bindings, Go toolchain, and basic packages all work.
    - bash: |
        set -ex
        IMAGE_TAG="$(IMAGE_TAG)"

        # sonic_db_config exercises swsscommon CGO bindings (SonicDBKey, DbConnector)
        # without needing Redis, catching swsscommon version mismatches early.
        make -f dev.mk dev-up DEV_IMAGE="${IMAGE_TAG}"
        make -f dev.mk test PKG=sonic_db_config DEV_IMAGE="${IMAGE_TAG}"
        make -f dev.mk dev-down DEV_IMAGE="${IMAGE_TAG}" || true
      displayName: 'Smoke test dev container image'

    # Login to sonicdev-microsoft ACR using the 'sonicdev' service connection.
    # Skipped on PRs (push step is also conditioned, but login is harmless on PRs).
    - task: Docker@2
      displayName: 'Login to sonicdev-microsoft ACR'
      condition: ne(variables['Build.Reason'], 'PullRequest')
      inputs:
        command: login
        containerRegistry: sonicdev

    # Push on non-PR builds only (master and release branches).
    # Tags pushed:
    #   :$(Build.SourceBranchName)-$(Build.BuildId)   — immutable per-build tag
    #   :$(Build.SourceBranchName)                     — rolling branch tag
    #   :latest                                         — only on master
    - bash: |
        set -ex
        docker push "$(IMAGE_TAG)"

        docker tag "$(IMAGE_TAG)" "$(IMAGE_BRANCH)"
        docker push "$(IMAGE_BRANCH)"

        if [[ "$(Build.SourceBranchName)" == "master" ]]; then
          docker tag "$(IMAGE_TAG)" "$(IMAGE_LATEST)"
          docker push "$(IMAGE_LATEST)"
        fi
        echo "✅ Pushed $(IMAGE_TAG)"
      displayName: 'Push dev image to ACR'
      condition: ne(variables['Build.Reason'], 'PullRequest')
