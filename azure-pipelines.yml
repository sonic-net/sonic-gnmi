# sonic-gnmi Azure Pipelines definition
#
# Stage layout:
#   StaticChecks  - fast language-level checks (gofmt).
#   Test          - unit, memory-leak, and integration tests + coverage gate.
#   Package       - produce amd64 and arm64 .deb artifacts.
#
# Notes on naming (do not "fix"):
#   * The job `build` inside stage `Test` is deliberately kept with both
#     `job: build` and `displayName: "build"`. The pipeline decorator that
#     publishes the diff-coverage GitHub check derives its name as
#     `coverage.{BuildDefinitionName}.{Agent.JobName}`. `Agent.JobName`
#     resolves to the job displayName, so changing either value would
#     rename the required `coverage.sonic-net.sonic-gnmi.build` check.

trigger:
  branches:
    include:
    - master
    - 202???
    - 201???

pr:
  branches:
    include:
    - master
    - 202???
    - 201???

variables:
  - name: BUILD_BRANCH
    ${{ if eq(variables['Build.Reason'], 'PullRequest') }}:
      value: $(System.PullRequest.TargetBranch)
    ${{ else }}:
      value: $(Build.SourceBranchName)
  - name: UNIT_TEST_FLAG
    value: 'ENABLE_TRANSLIB_WRITE=y'
  - name: GO_VERSION
    value: '1.24.4'


resources:
  repositories:
  - repository: sonic-mgmt-common
    type: github
    name: sonic-net/sonic-mgmt-common
    endpoint: sonic-net
    ref: refs/heads/$(BUILD_BRANCH)
  - repository: sonic-swss-common
    type: github
    name: sonic-net/sonic-swss-common
    endpoint: sonic-net
    ref: refs/heads/$(BUILD_BRANCH)

stages:
- stage: StaticChecks
  displayName: "Static Checks"
  jobs:
  - job: go_static_checks
    displayName: "Go static checks"
    timeoutInMinutes: 10

    pool:
      vmImage: ubuntu-22.04

    steps:
    - checkout: self
      clean: true
      displayName: 'Checkout code'

    - template: .azure/templates/install-go.yml
      parameters:
        version: $(GO_VERSION)

    - bash: |
        set -euo pipefail
        export PATH=$PATH:/usr/local/go/bin
        mapfile -t files < <(find . -type f -name '*.go' \
            ! -path './vendor/*' ! -path './build/*' \
            ! -path './patches/*' ! -path './proto/*' \
            ! -path './swsscommon/*')
        bad=$(gofmt -l "${files[@]}")
        if [ -n "$bad" ]; then
          echo "::error::gofmt found unformatted Go file(s):"
          printf '  %s\n' $bad
          echo
          echo "----- gofmt diff (first 200 lines) -----"
          gofmt -d $bad | head -n 200
          echo "----------------------------------------"
          echo
          echo "Fix with: gofmt -w <file>, then commit the result."
          exit 1
        fi
        echo "All files properly formatted."
      displayName: 'gofmt'

- stage: Test
  displayName: "Test"
  dependsOn: [StaticChecks]
  jobs:
  # Fast pure package testing - no SONiC dependencies needed
  - job: pure_tests
    displayName: "Pure package tests"
    timeoutInMinutes: 15

    pool:
      vmImage: ubuntu-22.04

    steps:
    - checkout: self
      clean: true
      displayName: 'Checkout code'

    - checkout: sonic-mgmt-common
      clean: true
      displayName: 'Checkout sonic-mgmt-common'

    - template: .azure/templates/install-go.yml
      parameters:
        version: $(GO_VERSION)

    - bash: |
        set -euo pipefail
        export PATH=$PATH:/usr/local/go/bin:$(go env GOPATH)/bin
        cd sonic-gnmi
        go mod tidy
        make -f pure.mk junit-xml
      displayName: 'Run pure package tests'

    - task: PublishTestResults@2
      displayName: 'Publish pure package test results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(System.DefaultWorkingDirectory)/sonic-gnmi/test-results/junit-pure.xml'
        failTaskOnFailedTests: true
        publishRunAttachments: true
        testRunTitle: 'Pure package tests'

    - task: PublishCodeCoverageResults@2
      displayName: 'Publish pure package coverage'
      condition: always()
      inputs:
        summaryFileLocation: '$(System.DefaultWorkingDirectory)/sonic-gnmi/test-results/coverage-pure.xml'

    - publish: $(System.DefaultWorkingDirectory)/sonic-gnmi/test-results/coverage-pure.xml
      artifact: coverage-pure
      displayName: 'Publish pure coverage artifact'
      condition: always()

  # Memory leak testing with address sanitizer
  - job: memleak_tests
    displayName: "Memory-leak tests"
    timeoutInMinutes: 45

    pool:
      name: sonicso1ES-amd64
      vmImage: ubuntu-22.04

    container:
      image: sonicdev-microsoft.azurecr.io:443/sonic-slave-trixie:latest

    steps:
    - template: .azure/templates/setup-test-env.yml
      parameters:
        buildBranch: $(BUILD_BRANCH)

    - bash: |
        set -euo pipefail
        cd sonic-gnmi
        make all
        $(UNIT_TEST_FLAG) make check_memleak_junit
      displayName: 'Run memory-leak tests'

    - task: PublishTestResults@2
      displayName: 'Publish memory-leak test results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '$(System.DefaultWorkingDirectory)/sonic-gnmi/test-results/junit-memleak-standard.xml'
        failTaskOnFailedTests: true
        publishRunAttachments: true
        testRunTitle: 'Memory-leak tests'

  # Full integration testing with SONiC dependencies
  - job: integration_tests
    displayName: "Integration tests"
    timeoutInMinutes: 60

    pool:
      name: sonicso1ES-amd64
      vmImage: ubuntu-22.04

    container:
      image: sonicdev-microsoft.azurecr.io:443/sonic-slave-trixie:latest

    steps:
    - template: .azure/templates/setup-test-env.yml
      parameters:
        buildBranch: $(BUILD_BRANCH)
        fetchDepth: 0

    - bash: |
        set -euo pipefail
        cd sonic-gnmi
        make all
        $(UNIT_TEST_FLAG) make check_gotest_junit
      displayName: "Run integration tests"

    - task: PublishTestResults@2
      displayName: 'Publish integration test results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: |
          $(System.DefaultWorkingDirectory)/sonic-gnmi/test-results/junit-integration-basic.xml
          $(System.DefaultWorkingDirectory)/sonic-gnmi/test-results/junit-integration-env.xml
          $(System.DefaultWorkingDirectory)/sonic-gnmi/test-results/junit-integration-dialout.xml
        failTaskOnFailedTests: true
        publishRunAttachments: true
        testRunTitle: 'Integration tests'

    - bash: |
        sudo pip3 install --quiet --break-system-packages --ignore-installed diff-cover
      displayName: 'Pre-install diff-cover for pipeline decorator'
      workingDirectory: $(System.DefaultWorkingDirectory)/sonic-gnmi

    - task: PublishCodeCoverageResults@2
      inputs:
        summaryFileLocation: '$(System.DefaultWorkingDirectory)/sonic-gnmi/coverage.xml'
      displayName: 'Publish coverage'

    - publish: $(System.DefaultWorkingDirectory)/sonic-gnmi/coverage.xml
      artifact: coverage-integration
      displayName: 'Publish integration coverage artifact'
      condition: succeeded()

  # Coverage aggregator. Job key AND displayName must both remain "build" so
  # the diff-coverage GitHub check stays named coverage.sonic-net.sonic-gnmi.build.
  - job: build
    displayName: "build"
    dependsOn: [pure_tests, integration_tests]
    condition: and(succeeded(), eq(variables['Build.Reason'], 'PullRequest'))
    timeoutInMinutes: 10

    pool:
      vmImage: ubuntu-22.04

    variables:
      DIFF_COVER_ENABLE: 'true'
      DIFF_COVER_CHECK_THRESHOLD: 80
      DIFF_COVER_WORKING_DIRECTORY: $(System.DefaultWorkingDirectory)
      DIFF_COVER_COVERAGE_FILES: '$(Pipeline.Workspace)/coverage-integration/coverage.xml $(Pipeline.Workspace)/coverage-pure/coverage-pure.xml'

    steps:
    - checkout: self
      clean: true
      fetchDepth: 0

    - download: current
      artifact: coverage-pure

    - download: current
      artifact: coverage-integration

- stage: Package
  displayName: "Package"
  dependsOn: [StaticChecks]
  jobs:
  - job: amd64
    displayName: "amd64 deb build"
    timeoutInMinutes: 60

    pool:
      name: sonicso1ES-amd64
      vmImage: ubuntu-22.04

    container:
      image: sonicdev-microsoft.azurecr.io:443/sonic-slave-trixie:latest

    steps:
    - template: .azure/templates/build-deb.yml
      parameters:
        buildBranch: $(BUILD_BRANCH)
        arch: amd64

  - job: arm64
    displayName: "arm64 deb build"
    timeoutInMinutes: 60

    pool:
      name: sonicso1ES-arm64

    container:
      image: sonicdev-microsoft.azurecr.io:443/sonic-slave-trixie:$(BUILD_BRANCH)-arm64

    steps:
    - template: .azure/templates/build-deb.yml
      parameters:
        buildBranch: $(BUILD_BRANCH)
        arch: arm64
        commonLibArtifact: common-lib.arm64
        swssCommonArtifact: sonic-swss-common-trixie.arm64
        publishArtifact: sonic-gnmi.arm64
