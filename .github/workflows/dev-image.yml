name: Dev Image

on:
  push:
    branches:
      - master
    paths:
      - 'Dockerfile.dev'
      - 'dev.mk'
      - '.azure/templates/download-dependencies.yml'
      - '.github/workflows/dev-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download dependencies
        uses: ./.azure/templates/download-dependencies.yml
        # NOTE: ADO DownloadPipelineArtifact is not available in GHA.
        # Until public dep hosting is set up, deps/ is committed to the branch.
        # Remove this note and add real download steps once artifacts are hosted
        # publicly (e.g., GitHub Releases or Azure Blob public container).
        continue-on-error: true

      - name: Build dev image
        run: |
          docker build \
            --build-arg BUILD_BRANCH=master \
            -f Dockerfile.dev \
            -t ghcr.io/${{ github.repository }}/dev:latest \
            -t ghcr.io/${{ github.repository }}/dev:${{ github.sha }} \
            .

      - name: Push dev image
        run: |
          docker push ghcr.io/${{ github.repository }}/dev:latest
          docker push ghcr.io/${{ github.repository }}/dev:${{ github.sha }}
