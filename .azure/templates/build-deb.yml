# Azure DevOps YAML Template: Build SONiC gNMI deb package
#
# Shared template for building sonic-gnmi .deb packages on both amd64 and arm64.
# Handles: checkout → install deps → build mgmt-common → build gnmi → publish artifacts.
#
# Usage:
#   - template: .azure/templates/build-deb.yml
#     parameters:
#       arch: amd64
#       buildBranch: $(BUILD_BRANCH)

parameters:
- name: buildBranch
  type: string
  default: $(BUILD_BRANCH)
- name: arch
  type: string
  default: amd64
  values:
  - amd64
  - arm64
- name: commonLibArtifact
  type: string
  default: common-lib
- name: swssCommonArtifact
  type: string
  default: sonic-swss-common-trixie
- name: publishArtifact
  type: string
  default: sonic-gnmi

steps:
# Checkout all required repositories
- checkout: self
  clean: true
  submodules: recursive
  displayName: 'Checkout code'

- checkout: sonic-mgmt-common
  clean: true
  submodules: recursive
  displayName: 'Checkout sonic-mgmt-common'

- checkout: sonic-swss-common
  clean: true
  submodules: recursive
  displayName: 'Checkout sonic-swss-common'

# Install dependencies (architecture-aware)
- template: install-dependencies.yml
  parameters:
    buildBranch: ${{ parameters.buildBranch }}
    arch: ${{ parameters.arch }}
    installTestDeps: false
    commonLibArtifact: ${{ parameters.commonLibArtifact }}
    swssCommonArtifact: ${{ parameters.swssCommonArtifact }}

# Build sonic-mgmt-common (generates YANG bindings + cvl schema)
- script: sonic-gnmi/scripts/build-mgmt-common.sh sonic-mgmt-common
  displayName: 'Build sonic-mgmt-common'

# Build sonic-gnmi .deb; default '*.deb' glob stages the mgmt-common debs
# alongside the sonic-gnmi deb, matching the pre-refactor 'cp ../*.deb'.
- script: sonic-gnmi/scripts/build-gnmi-deb.sh sonic-gnmi $(Build.ArtifactStagingDirectory)
  displayName: "Build ${{ parameters.arch }} deb"

# Clean up downloaded artifacts from staging
- script: rm -rf $(Build.ArtifactStagingDirectory)/download
  displayName: "Remove downloaded dependencies from artifacts"

# Publish deb artifacts
- publish: $(Build.ArtifactStagingDirectory)/
  artifact: ${{ parameters.publishArtifact }}
  displayName: "Archive ${{ parameters.arch }} artifacts"
