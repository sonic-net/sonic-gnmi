# Azure DevOps YAML Template: Install Go toolchain.
# `repoRoot` lets multi-checkout jobs resolve the script under their repo path.

parameters:
- name: version
  type: string
  default: '1.24.4'
- name: repoRoot
  type: string
  default: ''

steps:
- script: |
    set -euo pipefail
    ${{ parameters.repoRoot }}scripts/install-go.sh ${{ parameters.version }}
    export PATH=$PATH:/usr/local/go/bin
  displayName: 'Install Go ${{ parameters.version }}'
