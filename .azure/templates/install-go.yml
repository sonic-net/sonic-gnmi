# Azure DevOps YAML Template: Install Go toolchain
#
# Downloads and installs the requested Go release into /usr/local/go and
# exports it on PATH for subsequent steps in the same job.
#
# Usage:
#   - template: .azure/templates/install-go.yml
#     parameters:
#       version: '1.24.4'
#       repoRoot: 'sonic-gnmi/'  # path prefix so multi-checkout jobs resolve scripts/install-go.sh

parameters:
- name: version
  type: string
  default: '1.24.4'
- name: repoRoot
  type: string
  default: ''

steps:
- script: |
    set -euo pipefail
    ${{ parameters.repoRoot }}scripts/install-go.sh ${{ parameters.version }}
    export PATH=$PATH:/usr/local/go/bin
  displayName: 'Install Go ${{ parameters.version }}'
