# Azure DevOps YAML Template: SONiC Dependencies Installation
#
# Unified template for both amd64 and arm64 architectures.
# Controls architecture-specific behavior via the `arch` parameter.
#
# Usage:
#   - template: .azure/templates/install-dependencies.yml
#     parameters:
#       buildBranch: $(BUILD_BRANCH)
#       arch: amd64          # or arm64
#       installTestDeps: true # install pytest, redis, .NET (for test jobs)
#
# Dependencies installed (all architectures):
#   - libyang and libnl packages
#   - sonic-swss-common libraries
#   - sonic yang models
#   - protobuf compiler
#
# Additional dependencies when installTestDeps=true (amd64 only):
#   - pytest, jsonpatch
#   - redis-server
#   - .NET SDK 8.0

parameters:
- name: buildBranch
  type: string
  default: $(BUILD_BRANCH)
- name: arch
  type: string
  default: amd64
  values:
  - amd64
  - arm64
- name: installTestDeps
  type: boolean
  default: false

steps:
# === Download libyang + libnl debs ===
# amd64: from sonic-buildimage.vs (pipeline 142)
# arm64: from sonic-buildimage.common_libs
- ${{ if eq(parameters.arch, 'amd64') }}:
  - task: DownloadPipelineArtifact@2
    inputs:
      source: specific
      project: build
      pipeline: 142
      artifact: sonic-buildimage.vs
      runVersion: 'latestFromBranch'
      runBranch: 'refs/heads/${{ parameters.buildBranch }}'
      patterns: |
          target/debs/bookworm/libyang*.deb
          target/debs/bookworm/libnl*.deb
          target/python-wheels/bookworm/sonic_yang_models*.whl
    displayName: "Download bookworm debs"

- ${{ if eq(parameters.arch, 'arm64') }}:
  - task: DownloadPipelineArtifact@2
    inputs:
      source: specific
      project: build
      pipeline: Azure.sonic-buildimage.common_libs
      runVersion: 'latestFromBranch'
      runBranch: 'refs/heads/${{ parameters.buildBranch }}'
      path: $(Build.ArtifactStagingDirectory)/download
      artifact: common-lib.arm64
      patterns: |
        target/debs/bookworm/libyang-*_1.0*.deb
        target/debs/bookworm/libyang_1.0*.deb
        target/debs/bookworm/libnl-3-200_*.deb
        target/debs/bookworm/libnl-genl-3-200_*.deb
        target/debs/bookworm/libnl-route-3-200_*.deb
        target/debs/bookworm/libnl-nf-3-200_*.deb
    displayName: "Download libyang and libnl from arm64 common lib"

# === Install test dependencies (amd64 test jobs only) ===
- ${{ if and(eq(parameters.arch, 'amd64'), eq(parameters.installTestDeps, true)) }}:
  - script: |
      # PYTEST
      sudo pip3 install -U pytest
      sudo pip3 install -U jsonpatch

      # REDIS
      sudo apt-get update
      sudo apt-get install -y redis-server
      sudo sed -ri 's/^# unixsocket/unixsocket/' /etc/redis/redis.conf
      sudo sed -ri 's/^unixsocketperm .../unixsocketperm 777/' /etc/redis/redis.conf
      sudo sed -ri 's/redis-server.sock/redis.sock/' /etc/redis/redis.conf
      sudo service redis-server start
    displayName: "Install test dependencies (pytest, redis)"

# === Install libyang ===
- ${{ if eq(parameters.arch, 'amd64') }}:
  - script: |
      # Note: Must use version-specific pattern to avoid conflicts with libyang3 packages
      sudo dpkg -i ../target/debs/bookworm/libyang*1.0.73*.deb
    displayName: "Install libyang"

- ${{ if eq(parameters.arch, 'arm64') }}:
  - script: |
      set -ex
      sudo apt-get -y purge libnl-3-dev libnl-route-3-dev || true
      sudo dpkg -i $(find $(Build.ArtifactStagingDirectory)/download -name '*.deb')
    displayName: "Install libyang and libnl debs"

# === Install sonic yang models ===
# amd64: already downloaded above with bookworm debs
# arm64: need separate download
- ${{ if eq(parameters.arch, 'arm64') }}:
  - task: DownloadPipelineArtifact@2
    inputs:
      source: specific
      project: build
      pipeline: 142
      artifact: sonic-buildimage.vs
      runVersion: 'latestFromBranch'
      runBranch: 'refs/heads/${{ parameters.buildBranch }}'
      patterns: |
        target/python-wheels/bookworm/sonic_yang_models*.whl
    displayName: "Download yang wheels"

- script: |
    set -ex
    sudo pip3 install ../target/python-wheels/bookworm/sonic_yang_models*.whl
  displayName: "Install sonic yangs"

# === Install libnl (amd64 only — arm64 installs above with libyang) ===
- ${{ if eq(parameters.arch, 'amd64') }}:
  - script: |
      sudo apt-get -y purge libnl-3-dev libnl-route-3-dev
      sudo dpkg -i ../target/debs/bookworm/libnl-3-200_*.deb
      sudo dpkg -i ../target/debs/bookworm/libnl-genl-3-200_*.deb
      sudo dpkg -i ../target/debs/bookworm/libnl-route-3-200_*.deb
      sudo dpkg -i ../target/debs/bookworm/libnl-nf-3-200_*.deb
    displayName: "Install libnl dependencies"

# === Install .NET Core (amd64 test jobs only) ===
- ${{ if and(eq(parameters.arch, 'amd64'), eq(parameters.installTestDeps, true)) }}:
  - script: |
      set -ex
      curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
      sudo apt-add-repository https://packages.microsoft.com/debian/12/prod
      sudo apt-get update
      sudo apt-get install -y dotnet-sdk-8.0
    displayName: "Install .NET CORE"

# === Download and install sonic-swss-common ===
- task: DownloadPipelineArtifact@2
  inputs:
    source: specific
    project: build
    pipeline: Azure.sonic-swss-common
    artifact: sonic-swss-common-bookworm${{ if eq(parameters.arch, 'arm64') }}.arm64${{ endif }}
    runVersion: 'latestFromBranch'
    runBranch: 'refs/heads/${{ parameters.buildBranch }}'
  displayName: "Download sonic-swss-common (${{ parameters.arch }})"

- script: |
    set -ex
    sudo dpkg -i libswsscommon_1.0.0_${{ parameters.arch }}.deb
    sudo dpkg -i libswsscommon-dev_1.0.0_${{ parameters.arch }}.deb
    ${{ if eq(parameters.arch, 'amd64') }}
    sudo dpkg -i python3-swsscommon_1.0.0_amd64.deb
    ${{ endif }}
  workingDirectory: $(Pipeline.Workspace)/
  displayName: 'Install libswsscommon (${{ parameters.arch }})'

# === Install protoc ===
- script: |
    ${{ if eq(parameters.arch, 'arm64') }}
    sudo apt-get update
    ${{ endif }}
    sudo apt-get install -y protobuf-compiler
    protoc --version
  displayName: 'Install protoc'
