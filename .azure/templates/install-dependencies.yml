# Install SONiC build/test dependencies for both amd64 and arm64.
# Architecture-specific behavior is controlled by the `arch` parameter; test-only
# deps (pytest, redis) install when installTestDeps=true on amd64.

parameters:
- name: buildBranch
  type: string
  default: $(BUILD_BRANCH)
- name: arch
  type: string
  default: amd64
  values:
  - amd64
  - arm64
- name: installTestDeps
  type: boolean
  default: false
- name: commonLibArtifact
  type: string
  default: common-lib
- name: swssCommonArtifact
  type: string
  default: sonic-swss-common-trixie

steps:
- task: DownloadPipelineArtifact@2
  inputs:
    source: specific
    project: build
    pipeline: Azure.sonic-buildimage.common_libs
    runVersion: 'latestFromBranch'
    runBranch: 'refs/heads/${{ parameters.buildBranch }}'
    path: $(Build.ArtifactStagingDirectory)/download
    artifact: ${{ parameters.commonLibArtifact }}
    patterns: |
      target/debs/trixie/libyang3_*.deb
      target/debs/trixie/libyang-dev_3*.deb
      target/debs/trixie/libpcre3_*.deb
      target/debs/trixie/libpcre3-dev_*.deb
      target/debs/trixie/libpcre16-3_*.deb
      target/debs/trixie/libpcre32-3_*.deb
      target/debs/trixie/libpcrecpp0v5_*.deb
      target/debs/trixie/libnl-3-200_*.deb
      target/debs/trixie/libnl-genl-3-200_*.deb
      target/debs/trixie/libnl-route-3-200_*.deb
      target/debs/trixie/libnl-nf-3-200_*.deb
  displayName: "Download libyang and libnl from common_libs (${{ parameters.arch }})"

- ${{ if and(eq(parameters.arch, 'amd64'), eq(parameters.installTestDeps, true)) }}:
  - script: sonic-gnmi/scripts/install-test-deps.sh
    displayName: "Install pytest + refresh apt index"
  - script: sonic-gnmi/scripts/setup-redis.sh
    displayName: "Configure redis"

- script: sonic-gnmi/scripts/install-debs.sh $(Build.ArtifactStagingDirectory)/download
  displayName: "Install libyang and libnl debs"

- task: DownloadPipelineArtifact@2
  inputs:
    source: specific
    project: build
    pipeline: 142
    artifact: sonic-buildimage.vs
    runVersion: 'latestFromBranch'
    runBranch: 'refs/heads/${{ parameters.buildBranch }}'
    patterns: |
      target/python-wheels/trixie/sonic_yang_models*.whl
  displayName: "Download sonic yang models"

- script: sonic-gnmi/scripts/install-yang-models.sh '../target/python-wheels/trixie/sonic_yang_models*.whl'
  displayName: "Install sonic yangs"

- task: DownloadPipelineArtifact@2
  inputs:
    source: specific
    project: build
    pipeline: Azure.sonic-swss-common
    artifact: ${{ parameters.swssCommonArtifact }}
    runVersion: 'latestFromBranch'
    runBranch: 'refs/heads/${{ parameters.buildBranch }}'
  displayName: "Download sonic-swss-common (${{ parameters.arch }})"

# amd64: install libswsscommon + python3-swsscommon
# arm64: install libswsscommon only (no python3 package)
- script: sonic-gnmi/scripts/install-swsscommon.sh ${{ parameters.arch }}
  workingDirectory: $(Pipeline.Workspace)/
  displayName: 'Install libswsscommon (${{ parameters.arch }})'

- script: sonic-gnmi/scripts/install-protoc.sh ${{ parameters.arch }}
  displayName: 'Install protoc (${{ parameters.arch }})'
