# Azure DevOps YAML Template: SONiC Dependencies Installation
#
# Unified template for both amd64 and arm64 architectures.
# Controls architecture-specific behavior via the `arch` parameter.
#
# Usage:
#   - template: .azure/templates/install-dependencies.yml
#     parameters:
#       buildBranch: $(BUILD_BRANCH)
#       arch: amd64          # or arm64
#       installTestDeps: true # install pytest, redis, .NET (for test jobs)
#
# Dependencies installed (all architectures):
#   - libyang and libnl packages (from sonic-buildimage.common_libs)
#   - sonic-swss-common libraries
#   - sonic yang models (from sonic-buildimage.vs, arch-independent)
#   - protobuf compiler
#
# Additional dependencies when installTestDeps=true (amd64 only):
#   - pytest, jsonpatch
#   - redis-server
#   - .NET SDK 8.0

parameters:
- name: buildBranch
  type: string
  default: $(BUILD_BRANCH)
- name: arch
  type: string
  default: amd64
  values:
  - amd64
  - arm64
- name: installTestDeps
  type: boolean
  default: false
- name: commonLibArtifact
  type: string
  default: common-lib
- name: swssCommonArtifact
  type: string
  default: sonic-swss-common-trixie

steps:
# === Download libyang + libnl debs from common_libs ===
- task: DownloadPipelineArtifact@2
  inputs:
    source: specific
    project: build
    pipeline: Azure.sonic-buildimage.common_libs
    runVersion: 'latestFromBranch'
    runBranch: 'refs/heads/${{ parameters.buildBranch }}'
    path: $(Build.ArtifactStagingDirectory)/download
    artifact: ${{ parameters.commonLibArtifact }}
    patterns: |
      target/debs/trixie/libyang_1.0*.deb
      target/debs/trixie/libyang-*_1.0*.deb
      target/debs/trixie/libnl-3-200_*.deb
      target/debs/trixie/libnl-genl-3-200_*.deb
      target/debs/trixie/libnl-route-3-200_*.deb
      target/debs/trixie/libnl-nf-3-200_*.deb
  displayName: "Download libyang and libnl from common_libs (${{ parameters.arch }})"

# === Install test dependencies (amd64 test jobs only) ===
- ${{ if and(eq(parameters.arch, 'amd64'), eq(parameters.installTestDeps, true)) }}:
  - script: |
      # PYTEST
      sudo pip3 install -U pytest
      sudo pip3 install -U jsonpatch

      # REDIS
      sudo apt-get update
      sudo apt-get install -y redis-server
      sudo sed -ri 's/^# unixsocket/unixsocket/' /etc/redis/redis.conf
      sudo sed -ri 's/^unixsocketperm .../unixsocketperm 777/' /etc/redis/redis.conf
      sudo sed -ri 's/redis-server.sock/redis.sock/' /etc/redis/redis.conf
      sudo service redis-server start
    displayName: "Install test dependencies (pytest, redis)"

# === Install libyang + libnl debs ===
- script: |
    set -ex
    sudo apt-get -y purge libnl-3-dev libnl-route-3-dev || true
    sudo dpkg -i $(find $(Build.ArtifactStagingDirectory)/download -name '*.deb')
  displayName: "Install libyang and libnl debs"

# === Download and install sonic yang models (arch-independent, from pipeline 142) ===
- task: DownloadPipelineArtifact@2
  inputs:
    source: specific
    project: build
    pipeline: 142
    artifact: sonic-buildimage.vs
    runVersion: 'latestFromBranch'
    runBranch: 'refs/heads/${{ parameters.buildBranch }}'
    patterns: |
      target/python-wheels/trixie/sonic_yang_models*.whl
  displayName: "Download sonic yang models"

- script: |
    set -ex
    sudo pip3 install ../target/python-wheels/trixie/sonic_yang_models*.whl
  displayName: "Install sonic yangs"

# === Install .NET Core (amd64 test jobs only) ===
- ${{ if and(eq(parameters.arch, 'amd64'), eq(parameters.installTestDeps, true)) }}:
  - script: |
      set -ex
      curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
      sudo apt-add-repository https://packages.microsoft.com/debian/13/prod
      sudo apt-get update
      sudo apt-get install -y dotnet-sdk-8.0
    displayName: "Install .NET CORE"

# === Download and install sonic-swss-common ===
- task: DownloadPipelineArtifact@2
  inputs:
    source: specific
    project: build
    pipeline: Azure.sonic-swss-common
    artifact: ${{ parameters.swssCommonArtifact }}
    runVersion: 'latestFromBranch'
    runBranch: 'refs/heads/${{ parameters.buildBranch }}'
  displayName: "Download sonic-swss-common (${{ parameters.arch }})"

# amd64: install libswsscommon + python3-swsscommon
# arm64: install libswsscommon only (no python3 package)
- ${{ if eq(parameters.arch, 'amd64') }}:
  - script: |
      set -ex
      sudo dpkg -i libswsscommon_1.0.0_amd64.deb
      sudo dpkg -i libswsscommon-dev_1.0.0_amd64.deb
      sudo dpkg -i python3-swsscommon_1.0.0_amd64.deb
    workingDirectory: $(Pipeline.Workspace)/
    displayName: 'Install libswsscommon (amd64)'

- ${{ if eq(parameters.arch, 'arm64') }}:
  - script: |
      set -ex
      sudo dpkg -i libswsscommon_1.0.0_arm64.deb
      sudo dpkg -i libswsscommon-dev_1.0.0_arm64.deb
    workingDirectory: $(Pipeline.Workspace)/
    displayName: 'Install libswsscommon (arm64)'

# === Install protoc ===
- ${{ if eq(parameters.arch, 'arm64') }}:
  - script: |
      sudo apt-get update
      sudo apt-get install -y protobuf-compiler
      protoc --version
    displayName: 'Install protoc'

- ${{ if eq(parameters.arch, 'amd64') }}:
  - script: |
      sudo apt-get install -y protobuf-compiler
      protoc --version
    displayName: 'Install protoc'
