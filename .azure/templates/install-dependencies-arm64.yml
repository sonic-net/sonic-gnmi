# Azure DevOps YAML Template: SONiC Dependencies Installation (ARM64)
#
# ARM64 variant of install-dependencies.yml for cross-architecture deb builds.
# Only installs what's needed for `dpkg-buildpackage` — no tests run on ARM64.
#
# Usage:
#   - template: .azure/templates/install-dependencies-arm64.yml
#     parameters:
#       buildBranch: $(BUILD_BRANCH)

parameters:
- name: buildBranch
  type: string
  default: $(BUILD_BRANCH)

steps:
# Download arm64 libyang from common-lib
- task: DownloadPipelineArtifact@2
  inputs:
    source: specific
    project: build
    pipeline: Azure.sonic-buildimage.common_libs
    runVersion: 'latestFromBranch'
    runBranch: 'refs/heads/${{ parameters.buildBranch }}'
    path: $(Build.ArtifactStagingDirectory)/download
    artifact: common-lib.arm64
    patterns: |
      target/debs/bookworm/libyang-*_1.0*.deb
      target/debs/bookworm/libyang_1.0*.deb
  displayName: "Download libyang from arm64 common lib"

- script: |
    set -ex
    sudo dpkg -i $(find $(Build.ArtifactStagingDirectory)/download -name '*.deb')
  displayName: "Install libyang debs"

# Download arm64 sonic-swss-common
- task: DownloadPipelineArtifact@2
  inputs:
    source: specific
    project: build
    pipeline: Azure.sonic-swss-common
    artifact: sonic-swss-common-bookworm.arm64
    runVersion: 'latestFromBranch'
    runBranch: 'refs/heads/${{ parameters.buildBranch }}'
  displayName: "Download sonic-swss-common (arm64)"

- script: |
    set -ex
    sudo dpkg -i libswsscommon_1.0.0_arm64.deb
    sudo dpkg -i libswsscommon-dev_1.0.0_arm64.deb
  workingDirectory: $(Pipeline.Workspace)/
  displayName: 'Install libswsscommon (arm64)'

# Download yang wheels (arch-independent)
- task: DownloadPipelineArtifact@2
  inputs:
    source: specific
    project: build
    pipeline: 142
    artifact: sonic-buildimage.vs
    runVersion: 'latestFromBranch'
    runBranch: 'refs/heads/${{ parameters.buildBranch }}'
    patterns: |
      target/python-wheels/bookworm/sonic_yang_models*.whl
  displayName: "Download yang wheels"

- script: |
    set -ex
    sudo pip3 install ../target/python-wheels/bookworm/sonic_yang_models*.whl
  displayName: "Install sonic yangs"

# Install protoc
- script: |
    sudo apt-get update
    sudo apt-get install -y protobuf-compiler
    protoc --version
  displayName: 'Install protoc'
